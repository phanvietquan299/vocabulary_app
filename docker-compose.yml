services:
  db:
    image: postgres:16
    container_name: vocab_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vocab_app
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./back-end/app/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vocab_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./back-end
    container_name: fastapi_backend
    env_file:
      - ./back-end/.env
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./back-end:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./front-end
    container_name: react_frontend_DP
    env_file:
      - ./front-end/.env
    ports:
      - "5173:5173"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
